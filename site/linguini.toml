[project]
name = "linguini-site"
default_locale = "en"
locales = ["en", "ru", "es", "fr", "de", "it", "zh", "pt", "pt-BR"]

[paths]
schema = "linguini/schema"
locale = "linguini/locale"

[targets.ts]
out = "src/lib/generated/linguini"
module = "esm"
declaration = true
framework = "sveltekit"

[web]
strategy = ["url", "cookie", "localStorage", "preferredLanguage", "baseLocale"]
cookie_name = "LINGUINI_SITE_LOCALE"
cookie_path = "/"
cookie_max_age = 31536000
cookie_same_site = "lax"
cookie_secure = false
cookie_http_only = false
local_storage_key = "LINGUINI_SITE_LOCALE"
prefix_default_locale = true
base_path = ""
trailing_slash = "always"
redirect = true
exclude = ["/_app/**", "/favicon.ico", "/robots.txt"]
localize_links = true
