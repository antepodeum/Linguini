name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check file sizes
        run: ./scripts/check-file-size.sh
      - name: Check unit test structure
        run: ./scripts/check-unit-test-structure.sh
      - name: Check syntax fixtures
        run: ./scripts/check-syntax-fixtures.sh
      - name: Check snapshot workflow
        run: ./scripts/review-snapshots.sh --check
      - name: Validate generated JavaScript
        run: ./scripts/validate-generated-js.sh
      - name: Validate generated Rust
        run: ./scripts/validate-generated-rust.sh
      - name: Check spec gates
        run: ./scripts/check-spec-gates.sh
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
