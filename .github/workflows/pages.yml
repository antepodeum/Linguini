name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install site dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Resolve GitHub Pages routing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH || '__AUTO__' }}
          PAGES_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          set -euo pipefail

          normalize_base_path() {
            local value="${1:-}"
            value="${value#${value%%[![:space:]]*}}"
            value="${value%${value##*[![:space:]]}}"
            value="${value#/}"
            value="${value%/}"
            if [[ -z "$value" || "$value" == "/" ]]; then
              printf ''
            else
              printf '/%s' "$value"
            fi
          }

          first_line() {
            local file="$1"
            [[ -f "$file" ]] || return 0
            sed -n '1{s/[[:space:]]*$//;p;q;}' "$file"
          }

          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo_lower="$(printf '%s' "$repo_name" | tr '[:upper:]' '[:lower:]')"

          custom_domain="${PAGES_CUSTOM_DOMAIN:-}"
          if [[ -z "$custom_domain" ]]; then
            custom_domain="$(first_line site/static/CNAME)"
          fi
          if [[ -z "$custom_domain" ]]; then
            custom_domain="$(first_line CNAME)"
          fi

          if [[ -z "$custom_domain" ]]; then
            pages_json="$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages" 2>/dev/null || true)"

            if [[ -n "$pages_json" ]]; then
              custom_domain="$(PAGES_JSON="$pages_json" node -e 'const data = JSON.parse(process.env.PAGES_JSON || "{}"); process.stdout.write(data.custom_domain || "");')"
            fi
          fi

          if [[ "$PAGES_BASE_PATH" != "__AUTO__" ]]; then
            base_path="$(normalize_base_path "$PAGES_BASE_PATH")"
          elif [[ -n "$custom_domain" ]]; then
            base_path=""
          elif [[ "$repo_lower" == "$owner_lower.github.io" ]]; then
            base_path=""
          else
            base_path="/$(printf '%s' "$repo_name" | sed 's#^/*##; s#/*$##')"
          fi

          echo "BASE_PATH=$base_path" >> "$GITHUB_ENV"
          echo "PAGES_CUSTOM_DOMAIN_RESOLVED=$custom_domain" >> "$GITHUB_ENV"
          printf 'Resolved BASE_PATH=%s\n' "${base_path:-/}"
          if [[ -n "$custom_domain" ]]; then
            printf 'Resolved custom domain=%s\n' "$custom_domain"
          fi

      - name: Configure site for GitHub Pages
        working-directory: site
        run: pnpm pages:configure

      - name: Build site
        working-directory: site
        run: pnpm build

      - name: Add GitHub Pages metadata
        working-directory: site
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${PAGES_CUSTOM_DOMAIN_RESOLVED:-}" ]]; then
            printf '%s\n' "$PAGES_CUSTOM_DOMAIN_RESOLVED" > build/CNAME
          elif [[ -f static/CNAME ]]; then
            cp static/CNAME build/CNAME
          elif [[ -f ../CNAME ]]; then
            cp ../CNAME build/CNAME
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/build

  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
