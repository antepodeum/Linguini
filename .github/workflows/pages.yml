name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install site dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Derive GitHub Pages base path
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo_lower="$(printf '%s' "$repo_name" | tr '[:upper:]' '[:lower:]')"

          if [[ "$repo_lower" == "$owner_lower.github.io" ]]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
          fi

      - name: Configure site for GitHub Pages
        working-directory: site
        run: pnpm pages:configure

      - name: Build site
        working-directory: site
        run: pnpm build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/build

  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
