name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install site dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Resolve GitHub Pages routing
        shell: bash
        env:
          CONFIGURE_PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          CONFIGURE_PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH || '__AUTO__' }}
        run: |
          set -euo pipefail

          normalize_base_path() {
            local value="${1:-}"
            value="${value#${value%%[![:space:]]*}}"
            value="${value%${value##*[![:space:]]}}"
            value="${value#/}"
            value="${value%/}"

            if [[ -z "$value" || "$value" == "/" ]]; then
              printf ''
            else
              printf '/%s' "$value"
            fi
          }

          if [[ "$PAGES_BASE_PATH" != "__AUTO__" ]]; then
            base_path="$(normalize_base_path "$PAGES_BASE_PATH")"
          else
            base_path="$(normalize_base_path "$CONFIGURE_PAGES_BASE_PATH")"
          fi

          echo "BASE_PATH=$base_path" >> "$GITHUB_ENV"
          printf 'Resolved BASE_PATH=%s\n' "${base_path:-/}"
          if [[ -n "${CONFIGURE_PAGES_BASE_URL:-}" ]]; then
            printf 'GitHub Pages base URL=%s\n' "$CONFIGURE_PAGES_BASE_URL"
          fi

      - name: Configure site for GitHub Pages
        working-directory: site
        run: pnpm pages:configure

      - name: Build site
        working-directory: site
        run: pnpm build

      - name: Add GitHub Pages custom domain metadata
        working-directory: site
        shell: bash
        env:
          PAGES_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          set -euo pipefail

          if [[ -n "${PAGES_CUSTOM_DOMAIN:-}" ]]; then
            printf '%s\n' "$PAGES_CUSTOM_DOMAIN" > build/CNAME
          elif [[ -f static/CNAME ]]; then
            cp static/CNAME build/CNAME
          elif [[ -f ../CNAME ]]; then
            cp ../CNAME build/CNAME
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/build

  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
