name: VS Code Extension

on:
  workflow_dispatch:
    inputs:
      publish_ovsx:
        description: Publish the universal VSIX package to Open VSX after packaging
        type: boolean
        default: false
  push:
    tags:
      - 'vscode-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  package-universal:
    name: Package universal VSIX
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Package universal VSIX
        working-directory: editors/vscode
        run: npm run package:vsix
      - name: Add Visual Studio Marketplace summary
        run: |
          echo '### Visual Studio Marketplace artifact' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Download the `linguini-vscode` artifact from this workflow run, unzip it, then upload `linguini-vscode.vsix` manually in the Visual Studio Marketplace publisher portal.' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v6
        with:
          name: linguini-vscode
          path: editors/vscode/dist/linguini-vscode.vsix
          if-no-files-found: error
          retention-days: 30

  publish-ovsx:
    name: Publish Open VSX
    runs-on: ubuntu-latest
    needs: package-universal
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/vscode-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_ovsx)
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/download-artifact@v8
        with:
          name: linguini-vscode
          path: ovsx-dist
      - name: Check Open VSX token
        shell: bash
        run: |
          if [[ -z "${OVSX_PAT:-}" ]]; then
            echo 'Missing repository secret OVSX_PAT.' >&2
            exit 1
          fi
      - name: Publish universal VSIX package to Open VSX
        shell: bash
        run: |
          shopt -s nullglob
          files=(ovsx-dist/*.vsix)
          if (( ${#files[@]} == 0 )); then
            echo 'No VSIX file was downloaded.' >&2
            exit 1
          fi
          printf '%s\n' "${files[@]}"
          for vsix in "${files[@]}"; do
            npx --yes ovsx publish "$vsix"
          done
      - name: Add Open VSX summary
        shell: bash
        run: |
          echo '### Open VSX publish' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Published the universal VSIX package from the `linguini-vscode` artifact.' >> "$GITHUB_STEP_SUMMARY"
